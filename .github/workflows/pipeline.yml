name: Pipeline

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  initialize:
    name: Initialization of the repository
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    container:
      image: chocotechnologies/swagger-codegen:1.0.48
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize
        run: ./initialize.sh

  publish:
    name: Publishing of new version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: chocotechnologies/swagger-codegen:1.0.48
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Generate and package clients
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./publish.sh -v="$VERSION"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-clients-${{ steps.version.outputs.version }}
          path: artifacts/
